<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fist.bump</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: #1e1e2e;
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 10px var(--accent-glow);
      transition: transform 0.15s ease;
    }

    input[type="range"]:hover::-webkit-slider-thumb {
      transform: scale(1.2);
    }

    .servo-card {
      border: 1px solid #1a1a28;
      border-radius: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .servo-card:hover {
      background: #12121f;
      border-color: #252538;
    }

    .servo-card.active {
      border-color: var(--accent);
    }
  </style>
</head>
<body class="bg-[#0c0c0f] text-[#e2e2e8] min-h-screen">

  <header class="py-8 px-6 flex items-center justify-between">
    <span class="text-xs font-semibold tracking-widest text-[#3a3a4a] uppercase">Fist.bump</span>
    <span class="flex items-center gap-2 text-[11px] text-[#3a3a4a] bg-[#13131a] border border-[#1e1e2a] rounded-full px-3 py-1">
      <span id="mqttDot" class="w-1.5 h-1.5 rounded-full bg-[#2a2a3a] transition-all duration-500"></span>
      <span id="mqttStatus">Connecting</span>
    </span>
  </header>

  <main class="container mx-auto px-6 max-w-2xl">
    <p class="text-xl font-medium text-[#e2e2e8] mb-1">Robotic arm</p>
    <p class="text-xs text-[#3a3a4a] tracking-wide mb-8">5 DOF · MQTT · test.mosquitto.org</p>

    <div id="controls" class="flex flex-col gap-0.5">

      <div class="servo-card bg-[#10101a] p-4 grid items-center gap-4" style="grid-template-columns: 140px 1fr 52px; --accent: #a78bfa; --accent-glow: #a78bfa44;" id="card-servo1">
        <div>
          <p class="text-[13px] font-medium text-[#c8c8d8]">End effector</p>
          <p class="text-[10px] font-semibold tracking-widest uppercase text-[#a78bfa] opacity-70">DOF 1</p>
        </div>
        <input type="range" min="0" max="180" value="90" id="servo1">
        <div class="text-right">
          <span class="text-[22px] font-medium tabular-nums" style="color: #a78bfa;" id="servo1-value">90</span><span class="text-[11px] text-[#2e2e40]">°</span>
        </div>
      </div>

      <div class="servo-card bg-[#10101a] p-4 grid items-center gap-4" style="grid-template-columns: 140px 1fr 52px; --accent: #60a5fa; --accent-glow: #60a5fa44;" id="card-servo2">
        <div>
          <p class="text-[13px] font-medium text-[#c8c8d8]">Wrist</p>
          <p class="text-[10px] font-semibold tracking-widest uppercase text-[#60a5fa] opacity-70">DOF 2</p>
        </div>
        <input type="range" min="0" max="180" value="90" id="servo2">
        <div class="text-right">
          <span class="text-[22px] font-medium tabular-nums" style="color: #60a5fa;" id="servo2-value">90</span><span class="text-[11px] text-[#2e2e40]">°</span>
        </div>
      </div>

      <div class="servo-card bg-[#10101a] p-4 grid items-center gap-4" style="grid-template-columns: 140px 1fr 52px; --accent: #34d399; --accent-glow: #34d39944;" id="card-servo3">
        <div>
          <p class="text-[13px] font-medium text-[#c8c8d8]">Elbow</p>
          <p class="text-[10px] font-semibold tracking-widest uppercase text-[#34d399] opacity-70">DOF 3</p>
        </div>
        <input type="range" min="0" max="180" value="90" id="servo3">
        <div class="text-right">
          <span class="text-[22px] font-medium tabular-nums" style="color: #34d399;" id="servo3-value">90</span><span class="text-[11px] text-[#2e2e40]">°</span>
        </div>
      </div>

      <div class="servo-card bg-[#10101a] p-4 grid items-center gap-4" style="grid-template-columns: 140px 1fr 52px; --accent: #fb923c; --accent-glow: #fb923c44;" id="card-servo4">
        <div>
          <p class="text-[13px] font-medium text-[#c8c8d8]">Shoulder</p>
          <p class="text-[10px] font-semibold tracking-widest uppercase text-[#fb923c] opacity-70">DOF 4</p>
        </div>
        <input type="range" min="0" max="180" value="90" id="servo4">
        <div class="text-right">
          <span class="text-[22px] font-medium tabular-nums" style="color: #fb923c;" id="servo4-value">90</span><span class="text-[11px] text-[#2e2e40]">°</span>
        </div>
      </div>

      <div class="servo-card bg-[#10101a] p-4 grid items-center gap-4" style="grid-template-columns: 140px 1fr 52px; --accent: #f472b6; --accent-glow: #f472b644;" id="card-servo5">
        <div>
          <p class="text-[13px] font-medium text-[#c8c8d8]">Base</p>
          <p class="text-[10px] font-semibold tracking-widest uppercase text-[#f472b6] opacity-70">DOF 5</p>
        </div>
        <input type="range" min="0" max="180" value="90" id="servo5">
        <div class="text-right">
          <span class="text-[22px] font-medium tabular-nums" style="color: #f472b6;" id="servo5-value">90</span><span class="text-[11px] text-[#2e2e40]">°</span>
        </div>
      </div>

    </div>

    <div class="flex items-center justify-between mt-6 pt-5 border-t border-[#13131e]">
      <span class="text-[11px] text-[#2e2e42]" id="lastPub">No activity yet</span>
      <button id="resetButton" class="text-xs font-medium text-[#44445a] bg-transparent border border-[#1e1e2c] rounded-lg px-4 py-2 hover:border-[#33334a] hover:text-[#9999bb] hover:bg-[#13131e] transition-all duration-200">
        ↺ Reset all
      </button>
    </div>
  </main>

  <script>
    const options = {
      connectTimeout: 4000,
      clientId: "web_client_" + Math.random().toString(16).substr(2, 8),
    };
    const mqttClient = mqtt.connect('wss://test.mosquitto.org:8081', options);

    mqttClient.on('connect', () => {
      console.log('Connected to MQTT Broker');
      const dot = document.getElementById('mqttDot');
      dot.style.background = '#22c55e';
      dot.style.boxShadow = '0 0 8px #22c55e55';
      document.getElementById('mqttStatus').textContent = 'Connected';
    });

    mqttClient.on('offline', () => {
      document.getElementById('mqttDot').style.background = '#2a2a3a';
      document.getElementById('mqttStatus').textContent = 'Offline';
    });

    function fmtTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    const servoMeta = {
      servo1: { label: 'End effector' },
      servo2: { label: 'Wrist' },
      servo3: { label: 'Elbow' },
      servo4: { label: 'Shoulder' },
      servo5: { label: 'Base' },
    };

    const activeTimeouts = {};

    const servos = ['servo1', 'servo2', 'servo3', 'servo4', 'servo5'];
    servos.forEach(servo => {
      const slider = document.getElementById(servo);
      slider.addEventListener('input', (event) => {
        const value = event.target.value;
        document.getElementById(`${servo}-value`).innerText = value;
        mqttClient.publish(`robotic_arm/${servo}`, value);
        document.getElementById('lastPub').textContent = `${servoMeta[servo].label} → ${value}°  ·  ${fmtTime()}`;

        const card = document.getElementById(`card-${servo}`);
        card.classList.add('active');
        clearTimeout(activeTimeouts[servo]);
        activeTimeouts[servo] = setTimeout(() => card.classList.remove('active'), 800);
      });
    });

    document.getElementById('resetButton').addEventListener('click', () => {
      servos.forEach(servo => {
        const slider = document.getElementById(servo);
        slider.value = 90;
        document.getElementById(`${servo}-value`).innerText = 90;
        mqttClient.publish(`robotic_arm/${servo}`, '90');
      });
      document.getElementById('lastPub').textContent = `All reset · ${fmtTime()}`;
    });
  </script>
</body>
</html>
